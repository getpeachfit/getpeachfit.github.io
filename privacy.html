<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<title>PeachFit Privacy Policy · 개인정보처리방침</title>
<style>
  :root {
    --coral:#D2451E; --coral-soft:#FF7E6B; --ink:#1f2937;
    --muted:#6b7280; --line:#e5e7eb; --bg:#ffffff; --th:#fff5f1;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Malgun Gothic","Noto Sans KR","Hiragino Sans","Yu Gothic","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    line-height:1.7; font-size:16px; letter-spacing:-0.01em;
  }
  .topbar { height:4px; background:linear-gradient(90deg,var(--coral-soft),var(--coral)); }
  .wrap { max-width:640px; margin:0 auto; padding:48px 20px 80px; }
  h1 { font-size:1.6rem; font-weight:800; margin:8px 0 4px; letter-spacing:-0.02em; }
  .sub { color:var(--muted); font-size:.95rem; margin:0 0 28px; }
  .note { display:none; background:var(--th); border-radius:12px; padding:10px 14px; font-size:.9rem; color:var(--coral); margin:0 0 16px; }
  ul.langs { list-style:none; margin:0; padding:0; }
  ul.langs li { margin:0 0 10px; }
  ul.langs a {
    display:flex; justify-content:space-between; align-items:center;
    border:1px solid var(--line); border-radius:14px; padding:16px 18px;
    text-decoration:none; color:var(--ink); font-weight:700;
  }
  ul.langs a span.doc { color:var(--muted); font-weight:500; font-size:.9rem; }
  ul.langs a:hover { border-color:var(--coral-soft); }
  ul.langs li.suggest a { border-color:var(--coral); background:var(--th); }
  .foot { margin-top:36px; color:var(--muted); font-size:.85rem; }
  .foot a { color:var(--coral); }
</style>
</head>
<body>
<div class="topbar"></div>
<main class="wrap">
<h1>PeachFit Privacy Policy</h1>
<p class="sub">개인정보처리방침 · プライバシーポリシー · 隱私權政策 — Please select your language.</p>
<p class="note" id="suggest-note">Suggested for your browser language ↓</p>
<ul class="langs">
  <li id="lang-ko"><a href="https://getpeachfit.github.io/privacy/ko.html" hreflang="ko" lang="ko">한국어 <span class="doc">개인정보처리방침</span></a></li>
  <li id="lang-en"><a href="https://getpeachfit.github.io/privacy/en.html" hreflang="en" lang="en">English <span class="doc">Privacy Policy</span></a></li>
  <li id="lang-ja"><a href="https://getpeachfit.github.io/privacy/ja.html" hreflang="ja" lang="ja">日本語 <span class="doc">プライバシーポリシー</span></a></li>
  <li id="lang-zh-hant"><a href="https://getpeachfit.github.io/privacy/zh-hant.html" hreflang="zh-Hant" lang="zh-Hant">繁體中文 <span class="doc">隱私權政策</span></a></li>
</ul>
<p class="foot">Account deletion / 계정 삭제 안내: <a href="https://getpeachfit.github.io/account-deletion.html">account-deletion</a> · Contact: ingbbocp@gmail.com</p>
</main>
<script>
(function () {
  var l = (navigator.language || '').toLowerCase();
  var key = 'en';
  if (l.indexOf('ko') === 0) { key = 'ko'; }
  else if (l.indexOf('ja') === 0) { key = 'ja'; }
  else if (l.indexOf('zh') === 0) {
    key = (l.indexOf('hans') > -1 || l === 'zh-cn' || l === 'zh-sg') ? 'en' : 'zh-hant';
  }
  var el = document.getElementById('lang-' + key);
  if (el) {
    el.classList.add('suggest');
    el.parentNode.insertBefore(el, el.parentNode.firstChild);
    var s = document.getElementById('suggest-note');
    if (s) { s.style.display = 'block'; }
  }
})();
</script>
</body>
</html>
