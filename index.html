<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="index, follow">
<title>피치핏 법적 고지</title>
<style>
  :root {
    --coral:#D2451E; --coral-soft:#FF7E6B; --ink:#1f2937;
    --muted:#6b7280; --line:#e5e7eb; --bg:#ffffff; --th:#fff5f1;
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
    line-height:1.75; font-size:16px; letter-spacing:-0.01em;
    word-break:keep-all; overflow-wrap:anywhere;
  }
  .topbar { height:4px; background:linear-gradient(90deg,var(--coral-soft),var(--coral)); }
  .wrap { max-width:760px; margin:0 auto; padding:40px 20px 80px; }
  h1 { font-size:1.8rem; font-weight:800; margin:10px 0 6px; letter-spacing:-0.02em; }
  h2 { font-size:1.2rem; font-weight:700; color:var(--coral); margin:2.2em 0 .6em; padding-bottom:6px; border-bottom:1px solid var(--line); }
  h3 { font-size:1.02rem; font-weight:700; margin:1.4em 0 .4em; }
  p { margin:.7em 0; }
  ul,ol { margin:.6em 0; padding-left:1.4em; }
  li { margin:.35em 0; }
  strong { font-weight:700; }
  a { color:var(--coral); text-decoration:underline; text-underline-offset:2px; }
  .tablewrap { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; margin:1em 0; }
  table { width:100%; border-collapse:collapse; font-size:.92rem; }
  th,td { border:1px solid var(--line); padding:8px 10px; text-align:left; vertical-align:top; }
  th { background:var(--th); font-weight:700; }
  hr { border:0; border-top:1px solid var(--line); margin:2em 0; }
  .footnote { margin-top:48px; padding-top:16px; border-top:1px solid var(--line); color:var(--muted); font-size:.85rem; }
  @media (max-width:520px) {
    body { font-size:15px; }
    .wrap { padding:28px 16px 64px; }
    h1 { font-size:1.5rem; }
    h2 { font-size:1.1rem; }
  }
</style>
</head>
<body>
<div class="topbar"></div>
<main class="wrap">
<h1>피치핏 법적 고지</h1>
<p>잉보컴퍼니가 제공하는 모바일 애플리케이션 “피치핏”의 법적 문서입니다.</p>
<ul>
<li><a href="privacy.html">개인정보처리방침</a></li>
<li><a href="account-deletion.html">계정 삭제 안내</a></li>
</ul>
<p class="footnote">문의: ingbbocp@gmail.com</p>
</main>
</body>
</html>
